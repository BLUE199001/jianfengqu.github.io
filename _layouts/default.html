<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #003366; /* 人大蓝 */
            --text-color: #333;
            --bg-color: #f8f9fa;
            --sidebar-width: 300px;
        }

        body {
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 顶部装饰条 */
        header {
            height: 4px;
            background: var(--primary-color);
            width: 100%;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            display: flex;
            gap: 40px;
            padding: 0 20px;
            flex-grow: 1;
        }

        /* 侧边栏布局 */
        .sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
            text-align: center;
        }

        .profile-card {
            background: white;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 40px;
        }

        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 10px; /* 采用稍微圆角的方形，更显现代感 */
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #eee;
        }

        .sidebar h2 { margin: 10px 0 5px; color: var(--primary-color); font-size: 1.5rem; }
        .sidebar p { margin: 5px 0; font-size: 0.9rem; color: #666; }
        
        .contact-info {
            margin-top: 20px;
            text-align: left;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .contact-item { display: flex; align-items: center; margin-bottom: 8px; }
        .contact-item strong { width: 50px; color: var(--primary-color); }

        /* 主内容区 */
        main {
            flex: 1;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Markdown 内容样式美化 */
        h3 { 
            border-left: 5px solid var(--primary-color); 
            padding-left: 15px; 
            margin-top: 40px;
            color: var(--primary-color);
            font-size: 1.4rem;
        }
        h3:first-of-type { margin-top: 0; }
        
        h4 { color: #555; margin-bottom: 10px; border-bottom: 1px solid #eee; }

        ul { padding-left: 20px; }
        li { margin-bottom: 10px; }

        /* 论文展示特殊样式 */
        main li {
            list-style: none;
            position: relative;
            padding-left: 0;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }
        main li strong { color: #d32f2f; } /* 突出显示 CCF 分级 */

        footer {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 0.8rem;
        }

        /* 响应式适配 */
        @media (max-width: 850px) {
            .container { flex-direction: column; margin-top: 0; }
            .sidebar { width: 100%; }
            .profile-card { position: relative; top: 0; }
            main { padding: 25px; }
        }
    </style>
</head>
<body>

<header></header>

<div class="container">
    <aside class="sidebar">
        <div class="profile-card">
            <img src="{{ '/assets/avatar.jpg' | relative_url }}" alt="Qu Jianfeng" class="profile-pic">
            <h2>瞿剑峰</h2>
            <p>Jianfeng Qu</p>
            <p>副教授 / 硕士生导师</p>
            <p>中国人民大学 智慧治理学院</p>
            <p >Email: <a href="mailto:jfqu@ruc.edu.cn">jfqu@ruc.edu.cn</a></div>

        </div>
    </aside>

    <main>
        {{ content }}
    </main>
</div>

<footer>
    <p>&copy; {{ "now" | date: "%Y" }} Jianfeng Qu. All Rights Reserved. Built with GitHub Pages.</p>
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #003366; /* 人大蓝 */
            --text-color: #333;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
        }

        /* 顶部装饰条 */
        header {
            height: 60px;
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .inner-header {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
        }

        .inner-header h1 { margin: 0; font-size: 1.4rem; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        /* 核心：确保左右结构的 Profile 区域 */
        .profile-section {
            display: flex; /* 关键：开启弹性布局 */
            flex-direction: row; /* 关键：水平排列 */
            align-items: flex-start;
            gap: 40px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .profile-pic-container {
            flex-shrink: 0; /* 防止图片被压缩 */
        }

        .profile-pic {
            width: 180px;
            height: auto;
            border-radius: 8px;
            border: 1px solid #eee;
            display: block;
        }

        .profile-info {
            flex: 1; /* 占据剩余空间 */
        }

        .profile-info h2 { margin: 0 0 10px 0; color: var(--primary-color); font-size: 1.8rem; }
        .profile-info p { margin: 5px 0; font-size: 1rem; color: #444; }
        
        .contact-list {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            list-style: none;
            padding-left: 0;
        }
        .contact-list li { margin-bottom: 5px; font-size: 0.9rem; }
        .contact-list strong { color: var(--primary-color); display: inline-block; width: 60px; }

        /* 正文内容样式 */
        .main-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h3 { 
            border-left: 5px solid var(--primary-color); 
            padding-left: 15px; 
            margin: 30px 0 20px;
            color: var(--primary-color);
        }

        /* 响应式：手机端变为上下结构 */
        @media (max-width: 768px) {
            .profile-section {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .contact-list { text-align: left; }
        }
    </style>
</head>
<body>

<header>
    <div class="inner-header">
        <h1>{{ site.title }}</h1>
    </div>
</header>

<div class="container">
    <section class="profile-section">
        <div class="profile-pic-container">
            <img src="{{ '/assets/avatar.jpg' | relative_url }}" alt="Jianfeng Qu" class="profile-pic">
        </div>
        
        <div class="profile-info">
            <h2>瞿剑峰 (Jianfeng Qu)</h2>
            <p><strong>副教授 / 硕士生导师</strong></p>
            <p>中国人民大学 智慧治理学院</p>
            <p>Email: <a href="mailto:jfqu@ruc.edu.cn">jfqu@ruc.edu.cn</a></p>

        </div>
    </section>

    <main class="main-content">
        {{ content }}
    </main>
</div>

<footer>
    <div style="text-align: center; padding: 40px 0; color: #999; font-size: 0.8rem;">
        &copy; {{ "now" | date: "%Y" }} Jianfeng Qu. All Rights Reserved.
    </div>
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #003366;
            --text-color: #333;
            --bg-color: #ffffff;
        }

        body {
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
        }

        /* 顶部 Header */
        header {
            height: 60px;
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .inner-header {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
        }

        .inner-header h1 { font-size: 1.5rem; margin: 0; }

        /* 外层容器 */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        /* =============================
           核心：左右两栏并排布局
           左栏：照片 + 个人信息（固定宽度）
           右栏：Markdown 正文（自适应）
           ============================= */
        .page-layout {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 50px;
        }

        /* 左栏：固定宽度 */
        .left-panel {
            flex: 0 0 220px;
            width: 220px;
            position: sticky;   /* 可选：滚动时左栏固定 */
            top: 20px;
        }

        /* 右栏：占据剩余空间 */
        .right-panel {
            flex: 1;
            min-width: 0;
        }

        /* 照片 */
        .profile-pic {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: block;
            margin-bottom: 16px;
        }

        /* 个人信息文字 */
        .profile-info h2 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .profile-info p {
            margin: 5px 0;
            font-size: 0.92rem;
            color: #444;
        }

        .profile-info a {
            color: var(--primary-color);
        }

        /* 右侧正文 Markdown 样式 */
        .main-content h3 {
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
            margin: 30px 0 20px;
            color: var(--primary-color);
        }

        .main-content ul {
            padding-left: 20px;
        }

        .main-content li {
            margin-bottom: 6px;
        }

        /* 响应式：手机端变为上下结构 */
        @media (max-width: 768px) {
            .page-layout {
                flex-direction: column;
                align-items: center;
            }

            .left-panel {
                flex: 0 0 auto;
                width: 200px;
                position: static;
                text-align: center;
            }

            .right-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="inner-header">
        <h1>{{ site.title }}</h1>
    </div>
</header>

<div class="container">
    <div class="page-layout">

        <!-- 左栏：照片 + 个人信息 -->
        <aside class="left-panel">
            <img src="{{ '/assets/avatar.png' | relative_url }}" alt="Jianfeng Qu" class="profile-pic">
            <div class="profile-info">
                <h2>瞿剑峰 (Jianfeng Qu)</h2>
                <p><strong>副教授 / 硕士生导师</strong></p>
                <p>中国人民大学 智慧治理学院</p>
                <p>Email: <a href="mailto:jfqu@ruc.edu.cn">jfqu@ruc.edu.cn</a></p>
            </div>
        </aside>

        <!-- 右栏：Markdown 正文内容 -->
        <main class="right-panel main-content">
            {{ content }}
        </main>

    </div>
</div>

<footer style="text-align: center; padding: 40px 0; color: #999; font-size: 0.8rem;">
    &copy; {{ "now" | date: "%Y" }} Jianfeng Qu.
</footer>

</body>
</html>
